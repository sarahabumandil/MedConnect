<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MedConnect — Dental Core | Clinical Registration & Telehealth Access</title>
  <meta name="description" content="MedConnect Dental Core — HIPAA-compliant dentistry clinical registration and appointment platform." />
  <meta name="theme-color" content="#0B1B22" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <main class="app-shell" role="application" aria-label="MedConnect Dental Core">

    <!-- Toast / SMS-Push Notification Surface -->
    <div id="toast-host" aria-live="polite"></div>

    <!-- Dynamic View Router Target -->
    <section id="view-root" aria-live="polite"></section>

    <!-- State-Driven Bottom Navigation -->
    <nav id="bottom-nav" class="bottom-nav" aria-label="Primary Navigation"></nav>

  </main>

  <!-- Application Modules (order matters: data → state → app) -->
  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
